<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body class="min-h-screen font-geist color-black">

    <div class="navbar bg-base-100 shadow-sm px-20">
        <div class="flex-1">
            <div class="flex items-center gap-1">
                <div class="w-10 rounded-full">
                    <img alt="logo" src="./assets/github-logo.png" />
                </div>
                <h3 class="text-2xl font-semibold">GitHub Issues Tracker</h3>
            </div>
        </div>
        <div class="flex gap-2">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search Issues" />
            </label>
            <button class="btn btn-primary ml-2">+ New Issue</button>
        </div>
    </div>

    <div class="mx-auto w-8/10 my-15">
        <div class="card bg-base-100 shadow-md rounded-lg px-3 py-8">
            <div class="card-body">
                <div class="filter">
                    <input class="btn filter-reset" type="radio" name="metaframeworks" aria-label="All" />
                    <input class="btn" type="radio" name="metaframeworks" aria-label="Sveltekit" />
                    <input class="btn" type="radio" name="metaframeworks" aria-label="Nuxt" />
                    <input class="btn" type="radio" name="metaframeworks" aria-label="Next.js" />
                </div>
            </div>
        </div>



        <div class="card bg-base-100 shadow-md rounded-lg mt-4">
            <div class="navbar bg-base-100 shadow-sm rounded-lg p-6">
                <div class="flex-1">
                    <div class="flex items-center gap-1">
                        <div class="rounded-full bg-white-purple p-3">
                            <img class="" alt="logo" src="./assets/Aperture.png" />
                        </div>
                        <div class="">
                            <h3 class="text-2xl font-semibold">50 Issues</h3>
                            <p>Track and manage your project issues</p>
                        </div>
                    </div>
                </div>
                <div class="">
                    <p>
                    <div class="status status-success"></div> Open <div class="status status-primary"></div> Closed</p>
                </div>
            </div>

            <div class="card-body">

                <div class="grid grid-cols-4 gap-4">
                    <div class="p-8 bg-white border-t-4 border-t-emerald-500 rounded-lg shadow-sm">Job 1</div>
                    <div class="p-8 bg-white border-t-4 border-t-purple-500 rounded-lg shadow-sm">Job 2</div>
                    <div class="p-8 bg-white border-t-4 border-t-emerald-500 rounded-lg shadow-sm">Job 3</div>
                    <div class="p-8 bg-white border-t-4 border-t-purple-500 rounded-lg shadow-sm">Job 4</div>
                </div>

            </div>
        </div>
    </div>



    <script src="./scripts/script.js"></script>

</body>

</html>
