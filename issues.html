<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body class="min-h-screen font-geist color-black bg-white-grey flex flex-col">

    <div class="navbar lg:bg-base-100 lg:shadow-sm px-20 flex flex-col lg:flex-row">
        <div class="flex-1">
            <div class="flex flex-col text-center lg:flex-row lg:text-left items-center gap-1">
                <div class="w-10 rounded-full">
                    <img alt="logo" src="./assets/github-logo.png" />
                </div>
                <h3 class="text-2xl font-semibold">GitHub Issues Tracker</h3>
            </div>
        </div>
        <div class="flex flex-col lg:flex-row gap-2">
            <form id="search-form" class="">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-query" type="search" required placeholder="Search Issues" />
                </label>
            </form>
            <button class="btn btn-primary lg:ml-2">+ New Issue</button>
        </div>
    </div>

    <div class="mx-auto w-7/10 mb-7 lg:my-15 card lg:bg-base-100 lg:shadow-md rounded-lg">
        <div class="card-body w-full flex">
            <div id="stat-filter" class="tabs flex justify-center lg:justify-start gap-x-2">
                <input id="all" type="radio" name="my_tabs_1"
                    class="filter-btn border-1 border-gray-200 tab bg-base-100 lg:bg-grey shadow-purple-500/5 shadow-md lg:shadow-none text-md font-bold lg:text-xs lg:font-semibold rounded-sm w-30 h-10 px-4 py-2 lg:w-20 lg:h-8 lg:px-3 lg:py-2"
                    aria-label="All" checked="checked" />
                <input id="open" type="radio" name="my_tabs_1"
                    class="filter-btn border-1 border-gray-200 tab bg-base-100 lg:bg-grey shadow-purple-500/5 shadow-md lg:shadow-none text-md font-bold lg:text-xs lg:font-semibold rounded-sm w-30 h-10 px-4 py-2 lg:w-20 lg:h-8 lg:px-3 lg:py-2"
                    aria-label="Open" />
                <input id="closed" type="radio" name="my_tabs_1"
                    class="filter-btn border-1 border-gray-200 tab bg-base-100 lg:bg-grey shadow-purple-500/5 shadow-md lg:shadow-none text-md font-bold lg:text-xs lg:font-semibold rounded-sm w-30 h-10 px-4 py-2 lg:w-20 lg:h-8 lg:px-3 lg:py-2"
                    aria-label="Closed" />
            </div>
        </div>
    </div>

    <div class="mx-auto w-7/10 my-15 card bg-base-100 shadow-md rounded-lg -mt-8 flex-1">
        <div class="navbar bg-base-100 shadow-sm rounded-lg p-6 flex flex-col md:flex-row text-center md:text-left">
            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <div class="hidden md:block rounded-full bg-white-purple p-3">
                        <img class="" alt="logo" src="./assets/Aperture.png" />
                    </div>
                    <div class="">
                        <h3 class="text-2xl font-semibold"><span id="filter-count">50</span> Issues</h3>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div class="status status-success"></div> Open
                </div>
                <div class="flex items-center gap-2">
                    <div class="status status-primary"></div> Closed
                </div>
            </div>
        </div>

        <div class="card-body bg-white-grey">

            <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 w-full">
            </div>

        </div>
    </div>

    <script src="./scripts/issue_script.js"></script>

</body>

</html>
